services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: netharion
      POSTGRES_PASSWORD: netharion
      POSTGRES_DB: netharion
    ports:
      - "5432:5432"
    volumes:
      - netharion_pg:/var/lib/postgresql/data

volumes:
  netharion_pg:
